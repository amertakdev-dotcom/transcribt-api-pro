# ============================================
# Render.com Deployment Configuration
# ============================================
# This file tells Render how to deploy both services.
# Upload this file to your Git repo root.
# Render will auto-detect it.

services:

  # =====================
  # 1. Python AI Service
  # =====================
  - type: web
    name: transcribe-ai-service
    runtime: python
    region: singapore  # closest to Cambodia
    plan: free
    buildCommand: pip install -r ai-service/requirements.txt
    startCommand: uvicorn ai-service.app:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.13.0
      - key: PORT
        value: 8000

  # =====================
  # 2. Node.js API Service
  # =====================
  - type: web
    name: transcribe-api-node
    runtime: node
    region: singapore
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: 24.14.0
      - key: MONGO_URL
        sync: false  # set manually in Render dashboard
      - key: AI_SERVICE_URL
        value: https://transcribe-ai-service.onrender.com
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000